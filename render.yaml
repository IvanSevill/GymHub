services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: gymhub-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gymhub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://gym-hub-frontend-opal.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: ROOT_EMAILS
        sync: false
      - key: ENVIRONMENT
        value: production

  # ── AI Server (GymChat) ───────────────────────────────────────────────────
  - type: web
    name: gymhub-ai-server
    runtime: python
    rootDir: ai-server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: gymhub-db
          property: connectionString
      - key: SECRET_KEY
        sync: false   # Must match gymhub-backend's SECRET_KEY exactly — copy from its env dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: FRONTEND_URL
        value: https://gym-hub-frontend-opal.vercel.app
      - key: BACKEND_URL
        value: https://gymhub-jd53.onrender.com   # update to match gymhub-backend's actual URL
      - key: AI_SERVER_URL
        value: https://gymhub-ai-server.onrender.com   # update after first deploy if name differs
      - key: ROOT_EMAILS
        sync: false
      - key: ENVIRONMENT
        value: production

  # ── Frontend (Vite / React) ───────────────────────────────────────────────
  - type: web
    name: gymhub-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gymhub-jd53.onrender.com
      - key: VITE_AI_URL
        value: https://gymhub-ai-server.onrender.com   # update after first deploy if name differs
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: gymhub-db
    databaseName: gymhub
    user: gymhub
