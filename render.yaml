services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: gymhub-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gymhub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://gymhub-frontend.onrender.com   # update if your site has a custom domain
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: ROOT_EMAILS
        sync: false

  # ── Frontend (Vite / React) ───────────────────────────────────────────────
  - type: web
    name: gymhub-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gymhub-backend.onrender.com   # must match the backend service URL
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: gymhub-db
    databaseName: gymhub
    user: gymhub
